name: Build Tauri macOS ARM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (ARM)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Locate DMG
        id: find_dmg
        run: |
          echo "Searching DMG..."
          find src-tauri/target -type f -name "*.dmg" | tee dmg.txt
          echo "DMG_PATH<<EOF" >> $GITHUB_OUTPUT
          cat dmg.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm-dmg
          path: |
            src-tauri/target/**/*.dmg
