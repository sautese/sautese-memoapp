<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Memo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="topbar">

        <span id="title">
            备忘录

            <div id="shortcutHelp">

                Ctrl/Cmd+1 置顶/隐藏<br>
                Ctrl/Cmd+2 隐藏删除项<br>
                Ctrl/Cmd+D 删除事项<br>
                Ctrl/Cmd+Q 星标事项<br>
                Ctrl/Cmd+↑↓ 调整排序<br>
                Ctrl/Cmd+←→ 切换日期<br>
                Ctrl/Cmd+4 退出程序

            </div>

        </span>

        <span id="dateLabel">
            06/09
        </span>

    </div>

    <div id="editor" spellcheck="false"></div>

    <script src="renderer.js"></script>

</body>

</html>
